<div class="page">

<div id="homeScreen">

    </div>
    <div class="controls">
      <button class="ctrl" id="prevBtn">&#9664;&#9664;</button>

      <button class="ctrl" id="nextBtn">&#9654;&#9654;</button>

      <button class="ctrl" id="shuffleBtn" title="Перемешать">&#8646;</button>

    <button class="tab" id="tabAlbums">Альбомы</button>

</div>


<!-- гости -->
<div id="guestScreen" class="hidden">

function fmt(sec){ if(!sec||isNaN(sec))return'0:00'; let m=Math.floor(sec/60),s=Math.floor(sec%60); return m+':'+(s<10?'0'+s:s); }
function showToast(msg){ let t=document.createElement('div'); t.className='toast'; t.innerText=msg; document.body.appendChild(t); setTimeout(()=>t.remove(),2200); }

<script>
// апи
async function apiGet(url){
  const r = await fetch(url);
  return r.json();
}
async function apiPost(url, body){
  const r = await fetch(url, {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(body)});
  return r.json();
}
async function apiDelete(url, body){
  const r = await fetch(url, {method:'DELETE', headers:{'Content-Type':'application/json'}, body:JSON.stringify(body)});
  return r.json();
}

// Загрузить треки с сервера
async function loadSongs(){
  try {
    const data = await apiGet('/api/songs');
    if(data.success && data.songs.length){
      data.songs.forEach(srv => {
        let local = allSongs.find(s => s.id === srv.id);
        if(local){ local.plays = srv.plays; local.name = srv.name; local.artist = srv.artist; }
      });
    }
  } catch(e){ console.warn('Треки из кэша, сервер недоступен'); }
  currentDisplaySongs = [...allSongs];
}

// Загрузить избранное с сервера
async function loadFavorites(){
  try {
    const data = await apiGet('/api/favorites/' + currentUserId);
    if(data.success){ userFavorites = data.favorites.map(s => s.id); }
  } catch(e){ userFavorites = []; }
}

// Загрузить плейлисты с сервера
async function loadPlaylists(){
  try {
    const data = await apiGet('/api/playlists/' + currentUserId);
    if(data.success){ userPlaylists = data.playlists; }
  } catch(e){ userPlaylists = []; }
}

// Обновить статистику
async function updateStats(){
  let total = allSongs.reduce((s,x)=>s+x.plays,0);
  let userCount = 0;
  try { const d = await apiGet('/api/users/count'); if(d.success) userCount = d.count; } catch(e){}
  ['statPlays','gStatPlays'].forEach(id=>{ let el=document.getElementById(id); if(el)el.innerText=total; });
  ['statTracks','gStatTracks'].forEach(id=>{ let el=document.getElementById(id); if(el)el.innerText=allSongs.length; });
  ['statUsers','gStatUsers'].forEach(id=>{ let el=document.getElementById(id); if(el)el.innerText=userCount; });
}

// Инкремент прослушивания через API
async function recordPlay(songId){
  try {
    const data = await apiPost('/api/play/'+songId, {});
    if(data.success){
      let s = allSongs.find(x=>x.id===songId);
      if(s) s.plays = data.plays;
      updateStats();
    }
  } catch(e){}
}
</script>

<script>
// раздел избранного
async function toggleFavorite(songId){
  if(!currentUserId) return;
  const isFav = userFavorites.includes(songId);
  if(isFav){
    try {
      const d = await apiDelete('/api/favorites', {userId: currentUserId, songId: songId});
      if(d.success || d.error){ // success или "уже нет" — убираем локально
        userFavorites = userFavorites.filter(id=>id!==songId);
        showToast('Удалено из избранного');
      } else { showToast(d.error||'Ошибка'); }
    } catch(e){ showToast('Ошибка сети'); }
  } else {
    try {
      const d = await apiPost('/api/favorites', {userId: currentUserId, songId: songId});
      if(d.success){
        userFavorites.push(songId);
        showToast('Добавлено в избранное');
      } else { showToast(d.error||'Ошибка'); }
    } catch(e){ showToast('Ошибка сети'); }
  }
  renderCurrentView();
}

// раздел плейлистов
async function createNewPlaylist(){
  let name = prompt('Название плейлиста:');
  if(!name || !name.trim()) return;
  try {
    const d = await apiPost('/api/playlists', {userId: currentUserId, name: name.trim()});
    if(d.success){
      userPlaylists.push(d.playlist);
      showToast('Плейлист создан');
      renderCurrentView();
    } else { showToast(d.error||'Ошибка'); }
  } catch(e){ showToast('Ошибка сети'); }
}

async function deletePlaylist(id){
  if(!confirm('Удалить плейлист?')) return;
  try {
    const d = await apiDelete('/api/playlists/'+id, {});
    if(d.success){
      userPlaylists = userPlaylists.filter(p=>p.id!==id);
      showToast('Плейлист удалён');
      renderCurrentView();
    } else { showToast(d.error||'Ошибка'); }
  } catch(e){ showToast('Ошибка сети'); }
}

async function showAddToPlaylistDialog(songId){
  if(!currentUserId) return;
  await loadPlaylists();
  if(!userPlaylists.length){
    if(confirm('Нет плейлистов. Создать?')) await createNewPlaylist();
    return;
  }
  let names = userPlaylists.map((p,i)=>(i+1)+'. '+p.name).join('\n');
  let choice = prompt('Выберите плейлист:\n'+names+'\n\nВведите номер:');
  let idx = parseInt(choice)-1;
  if(!isNaN(idx) && idx>=0 && idx<userPlaylists.length){
    let pl = userPlaylists[idx];
    if(pl.songIds.includes(songId)){ showToast('Уже в плейлисте'); return; }
    try {
      const d = await apiPost('/api/playlists/'+pl.id+'/songs', {songId: songId});
      if(d.success){
        pl.songIds.push(songId);
        showToast('Добавлено в «'+pl.name+'»');
      } else { showToast(d.error||'Ошибка'); }
    } catch(e){ showToast('Ошибка сети'); }
  }
}

function playPlaylist(id){
  let pl = userPlaylists.find(p=>p.id===id);
  if(!pl || !pl.songIds.length){ showToast('Плейлист пуст'); return; }
  let songs = pl.songIds.map(sid=>allSongs.find(s=>s.id===sid)).filter(Boolean);
  if(songs.length){ currentDisplaySongs=songs; currentTrackIndex=0; playTrack(songs[0]); renderCurrentView(); }
}
</script>

<script>
// отрисовка
function buildTrackRow(song, idx, isActive, showActions){
  let isFav = userFavorites.includes(song.id);
  let row = document.createElement('div');
  row.className = 'track-row' + (isActive ? ' active' : '');
  row.innerHTML =
    '<div class="track-num">'+(idx+1)+'</div>'+
    '<div class="track-info">'+
      '<div class="track-name">'+esc(song.name)+'</div>'+
      '<div class="track-artist-sm">'+esc(song.artist)+'</div>'+
    '</div>'+
    '<div class="track-plays">'+song.plays+'</div>'+
    (showActions ?
      '<div class="track-actions">'+
        '<button class="fav-btn" title="Избранное">'+(isFav?'&#9733;':'&#9734;')+'</button>'+
        '<button class="add-pl-btn" title="В плейлист">&#43;</button>'+
      '</div>' : '');
  if(showActions){
    row.querySelector('.fav-btn').addEventListener('click', e=>{ e.stopPropagation(); toggleFavorite(song.id); });
    row.querySelector('.add-pl-btn').addEventListener('click', e=>{ e.stopPropagation(); showAddToPlaylistDialog(song.id); });
  }
  return row;
}

function renderTracks(){
  let songs = allSongs.filter(s=>{
    if(!searchQuery.trim()) return true;
    let q = searchQuery.toLowerCase();
    return s.name.toLowerCase().includes(q) || s.artist.toLowerCase().includes(q);
  });
  currentDisplaySongs = songs;
  dynamicContent.innerHTML = '';
  if(!songs.length){ dynamicContent.innerHTML='<div class="muted" style="padding:12px;">Ничего не найдено</div>'; return; }
  songs.forEach((song, idx)=>{
    let isActive = (idx===currentTrackIndex && currentTab==='tracks');
    let row = buildTrackRow(song, idx, isActive, true);
    row.addEventListener('click', ()=>{ currentTrackIndex=idx; playTrack(song); renderCurrentView(); });
    dynamicContent.appendChild(row);
  });
}

function renderFavorites(){
  let favSongs = allSongs.filter(s=>userFavorites.includes(s.id));
  if(searchQuery.trim()){
    let q = searchQuery.toLowerCase();
    favSongs = favSongs.filter(s=>s.name.toLowerCase().includes(q)||s.artist.toLowerCase().includes(q));
  }
  dynamicContent.innerHTML = '';
  if(!favSongs.length){ dynamicContent.innerHTML='<div class="muted" style="padding:12px;">Избранное пусто</div>'; return; }
  favSongs.forEach((song, idx)=>{
    let row = buildTrackRow(song, idx, false, true);
    row.addEventListener('click', ()=>{
      let gi = allSongs.findIndex(s=>s.id===song.id);
      currentDisplaySongs = favSongs; currentTrackIndex = idx; playTrack(song); renderCurrentView();
    });
    dynamicContent.appendChild(row);
  });
}

function renderAlbums(){
  let filtered = albums.filter(a=>{
    if(!searchQuery.trim()) return true;
    let q = searchQuery.toLowerCase();
    return a.name.toLowerCase().includes(q) || a.artist.toLowerCase().includes(q);
  });
  dynamicContent.innerHTML = '';
  if(!filtered.length){ dynamicContent.innerHTML='<div class="muted" style="padding:12px;">Ничего не найдено</div>'; return; }
  filtered.forEach(album=>{
    let songs = allSongs.filter(s=>s.albumId===album.id);
    let totalPlays = songs.reduce((s,x)=>s+x.plays,0);
    let block = document.createElement('div'); block.className='album-block';
    let head = document.createElement('div'); head.className='album-head';
    head.innerHTML =
      '<div>'+
        '<div class="album-head-name">'+esc(album.name)+'</div>'+
        '<div class="album-head-sub">'+esc(album.artist)+' &bull; '+album.year+'</div>'+
      '</div>'+
      '<div style="display:flex;align-items:center;gap:6px;">'+
        '<span class="album-head-meta">'+songs.length+' тр. / '+totalPlays+' прослуш.</span>'+
        '<span class="album-arrow">&#9660;</span>'+
      '</div>';
    let tracksDiv = document.createElement('div'); tracksDiv.className='album-tracks';
    songs.forEach(song=>{
      let isFav = userFavorites.includes(song.id);
      let row = document.createElement('div'); row.className='track-row';
      row.innerHTML =
        '<div class="track-num" style="color:var(--accent);">&#9654;</div>'+
        '<div class="track-info">'+
          '<div class="track-name">'+esc(song.name)+'</div>'+
          '<div class="track-artist-sm">'+esc(song.artist)+'</div>'+
        '</div>'+
        '<div class="track-plays">'+song.plays+'</div>'+
        '<div class="track-actions">'+
          '<button class="fav-btn">'+(isFav?'&#9733;':'&#9734;')+'</button>'+
          '<button class="add-pl-btn">&#43;</button>'+
        '</div>';
      row.querySelector('.fav-btn').addEventListener('click',e=>{ e.stopPropagation(); toggleFavorite(song.id); });
      row.querySelector('.add-pl-btn').addEventListener('click',e=>{ e.stopPropagation(); showAddToPlaylistDialog(song.id); });
      row.addEventListener('click', e=>{
        e.stopPropagation();
        currentDisplaySongs = allSongs; currentTrackIndex = allSongs.findIndex(s=>s.id===song.id);
        playTrack(song); renderCurrentView();
      });
      tracksDiv.appendChild(row);
    });
    let arrow = head.querySelector('.album-arrow');
    head.addEventListener('click',()=>{ tracksDiv.classList.toggle('open'); arrow.style.transform=tracksDiv.classList.contains('open')?'rotate(180deg)':''; });
    block.appendChild(head); block.appendChild(tracksDiv);
    dynamicContent.appendChild(block);
  });
}

function renderPlaylistsList(){
  dynamicContent.innerHTML = '';
  let btn = document.createElement('button');
  btn.className='btn-accent btn-sm'; btn.style.marginBottom='12px'; btn.innerText='+ Создать плейлист';
  btn.onclick = createNewPlaylist;
  dynamicContent.appendChild(btn);
  if(!userPlaylists.length){
    let m = document.createElement('div'); m.className='muted'; m.style.padding='8px'; m.innerText='Плейлистов пока нет';
    dynamicContent.appendChild(m); return;
  }
  let wrap = document.createElement('div');
  wrap.style.cssText = 'border:1px solid var(--border);border-radius:6px;overflow:hidden;';
  userPlaylists.forEach(pl=>{
    let row = document.createElement('div'); row.className='playlist-row';
    row.innerHTML =
      '<div>'+
        '<div class="playlist-name">'+esc(pl.name)+'</div>'+
        '<div class="playlist-count">'+(pl.songIds?pl.songIds.length:0)+' треков</div>'+
      '</div>'+
      '<div style="display:flex;gap:6px;">'+
        '<button class="btn-accent btn-sm play-pl">&#9654; Играть</button>'+
        '<button class="btn-danger btn-sm del-pl">Удалить</button>'+
      '</div>';
    row.querySelector('.play-pl').addEventListener('click',e=>{ e.stopPropagation(); playPlaylist(pl.id); });
    row.querySelector('.del-pl').addEventListener('click',e=>{ e.stopPropagation(); deletePlaylist(pl.id); });
    wrap.appendChild(row);
  });
  dynamicContent.appendChild(wrap);
}

function renderCurrentView(){
  if(currentTab==='tracks')    renderTracks();
  else if(currentTab==='albums')   renderAlbums();
  else if(currentTab==='favorites') renderFavorites();
  else if(currentTab==='playlists') renderPlaylistsList();
}
</script>

<script>
// гостевой режим
function renderGuestTracks(){
  let songs = allSongs.filter(s=>{

    let q = searchQuery.toLowerCase();
    return s.name.toLowerCase().includes(q)||s.artist.toLowerCase().includes(q);
  });
  guestDynamicContent.innerHTML = '';
  if(!songs.length){ guestDynamicContent.innerHTML='<div class="muted" style="padding:12px;">Ничего не найдено</div>'; return; }
  songs.forEach((song,idx)=>{
    let row = document.createElement('div'); row.className='track-row'; row.style.opacity='.7';
    row.innerHTML =
      '<div class="track-num">'+(idx+1)+'</div>'+
      '<div class="track-info"><div class="track-name">'+esc(song.name)+'</div><div class="track-artist-sm">'+esc(song.artist)+'</div></div>'+
      '<div class="track-plays">'+song.plays+'</div>';
    guestDynamicContent.appendChild(row);
  });
}

function renderGuestAlbums(){
  let filtered = albums.filter(a=>{
    if(!searchQuery.trim()) return true;
    let q = searchQuery.toLowerCase();
    return a.name.toLowerCase().includes(q)||a.artist.toLowerCase().includes(q);
  });
  guestDynamicContent.innerHTML = '';
  if(!filtered.length){ guestDynamicContent.innerHTML='<div class="muted" style="padding:12px;">Ничего не найдено</div>'; return; }
  filtered.forEach(album=>{
    let songs = allSongs.filter(s=>s.albumId===album.id);
    let totalPlays = songs.reduce((s,x)=>s+x.plays,0);
    let block = document.createElement('div'); block.className='album-block';
    let head = document.createElement('div'); head.className='album-head';
    head.innerHTML =
      '<div><div class="album-head-name">'+esc(album.name)+'</div><div class="album-head-sub">'+esc(album.artist)+' &bull; '+album.year+'</div></div>'+
      '<div style="display:flex;align-items:center;gap:6px;"><span class="album-head-meta">'+songs.length+' тр. / '+totalPlays+' прослуш.</span><span class="album-arrow">&#9660;</span></div>';
    let tracksDiv = document.createElement('div'); tracksDiv.className='album-tracks';
    songs.forEach(song=>{
      let row = document.createElement('div'); row.className='track-row'; row.style.opacity='.7';
      row.innerHTML =
        '<div class="track-num" style="color:var(--accent);">&#9654;</div>'+
        '<div class="track-info"><div class="track-name">'+esc(song.name)+'</div><div class="track-artist-sm">'+esc(song.artist)+'</div></div>'+
        '<div class="track-plays">'+song.plays+'</div>';
      tracksDiv.appendChild(row);
    });
    let arrow = head.querySelector('.album-arrow');
    head.addEventListener('click',()=>{ tracksDiv.classList.toggle('open'); arrow.style.transform=tracksDiv.classList.contains('open')?'rotate(180deg)':''; });
    block.appendChild(head); block.appendChild(tracksDiv);
    guestDynamicContent.appendChild(block);
  });
}

function renderGuestView(){
  if(guestCurrentTab==='tracks') renderGuestTracks();
  else renderGuestAlbums();
}
</script>

<script>
// плеер апи
function playTrack(song){
  if(!song) return;
  currentTrackNameSpan.innerText = song.name;
  currentArtistNameSpan.innerText = song.artist;
  audio.src = song.src;
  audio.load();
  recordPlay(song.id);
  audio.play().catch(()=>{});
  isPlaying = true;
}

function nextTrack(){
  let list = currentDisplaySongs;
  if(!list.length) return;
  if(isShuffle) currentTrackIndex = Math.floor(Math.random()*list.length);
  else { currentTrackIndex++; if(currentTrackIndex>=list.length){ if(isLoop) currentTrackIndex=0; else return; } }
  playTrack(list[currentTrackIndex]); renderCurrentView();
}

function prevTrack(){
  let list = currentDisplaySongs;
  if(!list.length) return;
  currentTrackIndex--; if(currentTrackIndex<0) currentTrackIndex=list.length-1;
  playTrack(list[currentTrackIndex]); renderCurrentView();
}

function togglePlayPause(){
  if(!currentUserId) return;
  if(isPlaying) audio.pause(); else audio.play().catch(()=>{});
}

function updateProgressUI(){
  if(audio.duration&&!isNaN(audio.duration)){
    progressFill.style.width = (audio.currentTime/audio.duration*100)+'%';
    currentTimeLabel.innerText = fmt(audio.currentTime);
    durationLabel.innerText = fmt(audio.duration);
  }
}

function seekTrack(e){
  if(!currentUserId) return;
  let rect = progressArea.getBoundingClientRect();
  if(audio.duration) audio.currentTime = ((e.clientX-rect.left)/rect.width)*audio.duration;
}

function toggleLoop(){
  isLoop = !isLoop; loopBtn.classList.toggle('active-mode',isLoop);
  showToast(isLoop?'Повтор включён':'Повтор выключен');
}

function toggleShuffle(){
  isShuffle = !isShuffle; shuffleBtn.classList.toggle('active-mode',isShuffle);
  showToast(isShuffle?'Перемешивание включено':'Перемешивание выключено');
}

audio.addEventListener('play', ()=>{ isPlaying=true; playPauseBtn.innerHTML='&#9646;&#9646;'; });
audio.addEventListener('pause', ()=>{ isPlaying=false; playPauseBtn.innerHTML='&#9654;'; });
audio.addEventListener('timeupdate', updateProgressUI);
audio.addEventListener('ended', ()=>nextTrack());
</script>

<script>
// авторизация и запрещенные пароли
const WEAK_PASSWORDS = new Set([
  '123','1234','12345','123456','1234567','12345678','123456789','1234567890',
  'qwerty','qwerty123','password','password1','pass','passwd',
  'abc','abc123','abcd','abcdef','abcd1234',
  '111','1111','11111','111111','000000','0000','000',
  'iloveyou','letmein','welcome','admin','admin123','root','test','test123',
  'qazwsx','zxcvbn','qwertyuiop','asdfghjkl',
  'monkey','dragon','master','sunshine','princess','football',
  'login','user','guest','demo','sample','пароль','пароль1','привет','йцукен',
]);

function validatePasswordClient(pass){
  if(pass.length<6) return 'Пароль должен содержать не менее 6 символов';
  if(WEAK_PASSWORDS.has(pass.toLowerCase())) return 'Пароль слишком простой — придумайте надёжный';
  if(/^(.)\1+$/.test(pass)) return 'Пароль не может состоять из одинаковых символов';
  return null;
}

async function register(login, pass){
  authMsgDiv.style.color='';
  if(!login||!pass){ authMsgDiv.innerText='Заполните поля'; return; }
  if(login.length<3){ authMsgDiv.innerText='Логин должен содержать не менее 3 символов'; return; }
  const pwdErr = validatePasswordClient(pass);
  if(pwdErr){ authMsgDiv.innerText=pwdErr; return; }
  try {
    const d = await apiPost('/api/register', {login, password: pass});
    if(d.success){ authMsgDiv.style.color='green'; authMsgDiv.innerText='Готово — теперь войдите'; }
    else { authMsgDiv.innerText = d.error||'Ошибка'; }
  } catch(e){ authMsgDiv.innerText='Ошибка сети'; }
}

async function loginUser(login, pass){
  authMsgDiv.style.color='';
  if(!login||!pass){ authMsgDiv.innerText='Заполните поля'; return; }
  try {
    const d = await apiPost('/api/login', {login, password: pass});
    if(d.success){
      currentUserId = d.userId;
      currentUserLogin = d.login;
      sessionStorage.setItem('music_uid', currentUserId);
      sessionStorage.setItem('music_uname', currentUserLogin);
      await loadSongs();
      await loadFavorites();
      await loadPlaylists();
      switchToPlayer();
    } else {
      authMsgDiv.innerText = d.error||'Неверный логин или пароль';
    }
  } catch(e){ authMsgDiv.innerText='Ошибка сети'; }
}

function logout(){
  currentUserId=null; currentUserLogin=null; userFavorites=[]; userPlaylists=[];
  sessionStorage.removeItem('music_uid'); sessionStorage.removeItem('music_uname');
  audio.pause(); isPlaying=false;
  switchToHome(); showToast('Вы вышли');
}
</script>

<script>
// табло
function setActiveTab(tab){
  [tabTracks,tabAlbums,tabFavorites,tabPlaylists].forEach(t=>t.classList.remove('active'));
  tab.classList.add('active');
}

function switchToPlayer(){
  homeScreen.classList.add('hidden');
  guestScreen.classList.add('hidden');
  playerScreen.classList.remove('hidden');
  greetUsername.innerText = currentUserLogin||'';
  searchQuery=''; if(searchField) searchField.value='';
  currentTab='tracks'; setActiveTab(tabTracks);
  currentDisplaySongs=[...allSongs]; currentTrackIndex=0;
  renderCurrentView(); updateStats();
}

function switchToHome(){
  homeScreen.classList.remove('hidden');
  playerScreen.classList.add('hidden');
  guestScreen.classList.add('hidden');
  authMsgDiv.innerText=''; loginName.value=''; loginPass.value='';
}

async function switchToGuest(){
  homeScreen.classList.add('hidden');
  playerScreen.classList.add('hidden');
  guestScreen.classList.remove('hidden');
  searchQuery=''; if(guestSearchField) guestSearchField.value='';
  guestCurrentTab='tracks';
  guestTabTracks.classList.add('active'); guestTabAlbums.classList.remove('active');
  await loadSongs();
  renderGuestView(); updateStats();
}

function toggleTheme(){
  document.body.classList.toggle('dark');
  localStorage.setItem('theme_pref', document.body.classList.contains('dark')?'dark':'light');
}

function loadTheme(){
  if(localStorage.getItem('theme_pref')==='dark') document.body.classList.add('dark');
}

async function restoreSession(){
  let uid = sessionStorage.getItem('music_uid');
  let uname = sessionStorage.getItem('music_uname');
  if(uid && uname){
    currentUserId = parseInt(uid);
    currentUserLogin = uname;
    await loadSongs();
    await loadFavorites();
    await loadPlaylists();
    switchToPlayer();
  } else {
    switchToHome();
  }
}

// события юзверя
document.getElementById('loginBtn').onclick  = ()=>loginUser(loginName.value, loginPass.value);
document.getElementById('registerBtn').onclick = ()=>register(loginName.value, loginPass.value);
document.getElementById('guestEnterBtn').onclick = ()=>switchToGuest();
document.getElementById('logoutBtn').onclick = ()=>logout();
document.getElementById('exitGuestBtn').onclick  = ()=>switchToHome();
document.getElementById('backToHomeGuest').onclick = ()=>switchToHome();
document.getElementById('themeToggleBtn').onclick = ()=>toggleTheme();
document.getElementById('themeToggleBtnGuest').onclick = ()=>toggleTheme();

tabTracks.onclick = ()=>{ currentTab='tracks'; setActiveTab(tabTracks); renderCurrentView(); };
tabAlbums.onclick = ()=>{ currentTab='albums'; setActiveTab(tabAlbums); renderCurrentView(); };
tabFavorites.onclick = ()=>{ currentTab='favorites'; setActiveTab(tabFavorites); renderCurrentView(); };
tabPlaylists.onclick = ()=>{ currentTab='playlists'; setActiveTab(tabPlaylists); renderCurrentView(); };

guestTabTracks.onclick = ()=>{ guestCurrentTab='tracks'; guestTabTracks.classList.add('active'); guestTabAlbums.classList.remove('active'); renderGuestView(); };
guestTabAlbums.onclick = ()=>{ guestCurrentTab='albums'; guestTabAlbums.classList.add('active'); guestTabTracks.classList.remove('active'); renderGuestView(); };

searchField.oninput = e=>{ searchQuery=e.target.value; renderCurrentView(); };
guestSearchField.oninput = e=>{ searchQuery=e.target.value; renderGuestView(); };

playPauseBtn.onclick = togglePlayPause;
prevBtn.onclick = prevTrack;
nextBtn.onclick = nextTrack;
loopBtn.onclick = toggleLoop;
shuffleBtn.onclick = toggleShuffle;
progressArea.addEventListener('click', seekTrack);
volumeSlider.oninput = ()=>{ audio.volume=volumeSlider.value/100; };
loginPass.addEventListener('keydown', e=>{ if(e.key==='Enter') loginUser(loginName.value,loginPass.value); });

// база
audio.volume = 0.7;
loadTheme();
restoreSession();
</script>


<script>
// ========== ЗАГРУЗКА ТРЕКОВ ==========
const uploadModal      = document.getElementById("uploadModal");
const uploadNameInput  = document.getElementById("uploadName");
const uploadArtistInput= document.getElementById("uploadArtist");
const uploadFileInput  = document.getElementById("uploadFileInput");
const uploadFileLabel  = document.getElementById("uploadFileLabel");
const uploadFileWrap   = document.getElementById("uploadFileWrap");
const uploadMsg        = document.getElementById("uploadMsg");

uploadFileInput.addEventListener("change", () => {
  const file = uploadFileInput.files[0];
  if (file) {
    uploadFileLabel.innerText = file.name;
    uploadFileWrap.style.borderColor = "var(--accent)";
    if (!uploadNameInput.value.trim())
      uploadNameInput.value = file.name.replace(/\.[^.]+$/, "");
  }
});

uploadFileWrap.addEventListener("dragover", e => { e.preventDefault(); uploadFileWrap.style.borderColor = "var(--accent)"; });
uploadFileWrap.addEventListener("dragleave", () => { uploadFileWrap.style.borderColor = ""; });
uploadFileWrap.addEventListener("drop", e => {
  e.preventDefault();
  uploadFileWrap.style.borderColor = "";
  const file = e.dataTransfer.files[0];
  if (!file) return;
  if (!file.name.match(/\.(mp3|ogg|wav|flac)$/i)) { uploadMsg.innerText = "Только mp3, ogg, wav, flac"; return; }
  const dt = new DataTransfer();
  dt.items.add(file);
  uploadFileInput.files = dt.files;
  uploadFileLabel.innerText = file.name;
  if (!uploadNameInput.value.trim()) uploadNameInput.value = file.name.replace(/\.[^.]+$/, "");
});

function openUploadModal() {
  uploadNameInput.value = "";
  uploadArtistInput.value = "";
  uploadFileInput.value = "";
  uploadFileLabel.innerText = "Нажмите или перетащите mp3-файл";
  uploadFileWrap.style.borderColor = "";
  uploadMsg.innerText = "";
  uploadModal.classList.remove("hidden");
  uploadModal.style.display = "flex";
}

function closeUploadModal() {
  uploadModal.classList.add("hidden");
  uploadModal.style.display = "";
}

document.getElementById("uploadCancelBtn").onclick = closeUploadModal;
uploadModal.addEventListener("click", e => { if (e.target === uploadModal) closeUploadModal(); });

document.getElementById("uploadSubmitBtn").onclick = async () => {
  uploadMsg.innerText = "";
  const file = uploadFileInput.files[0];
  if (!file) { uploadMsg.innerText = "Выберите файл"; return; }
  const btn = document.getElementById("uploadSubmitBtn");
  btn.disabled = true; btn.innerText = "Загружается...";
  const formData = new FormData();
  formData.append("file", file);
  formData.append("name",   uploadNameInput.value.trim());
  formData.append("artist", uploadArtistInput.value.trim());
  try {
    const r = await fetch("/api/songs/upload", { method: "POST", body: formData });
    const d = await r.json();
    if (d.success) {
      allSongs.push(Object.assign({ albumId: null }, d.song));
      currentDisplaySongs = [...allSongs];
      closeUploadModal();
      showToast("Трек «" + d.song.name + "» загружен");
      currentTab = "tracks"; setActiveTab(tabTracks);
      renderCurrentView(); updateStats();
    } else { uploadMsg.innerText = d.error || "Ошибка загрузки"; }
  } catch(e) { uploadMsg.innerText = "Ошибка сети"; }
  finally { btn.disabled = false; btn.innerText = "Загрузить"; }
};
</script>
